<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="faculty-page.html">SPC Faculty Site</a>

        <div>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="faculty-page.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="bg-light text-white container mt-5">

    <h2>Contact Me</h2>

    <form class="mt-4">

        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Name</label>
            <div class="col-sm-10">
            <input type="text" class="form-control" placeholder="Enter your name">
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Email</label>
            <div class="col-sm-10">
            <input type="email" class="form-control" placeholder="Enter your email">
            </div>
        </div>

        <div class=" row mb-3">
            <label class="col-sm-2 col-form-label">Reason</label>
            <div class="col-sm-10">
            <select class="form-select">
                <option>Office Hours</option>
                <option>Course Question</option>
                <option>Research Opportunity</option>
                <option>Questions about extracurricular activities</option>
                <option>Opinions on extraterrestrial life</option>
            </select>
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Message</label>
            <div class="col-sm-10">
            <textarea class="form-control" rows="4"></textarea>
            </div>
        </div>

        <button class="btn btn-primary">Submit</button>

    </form>

</div>


</form>
<footer class="bg-dark text-white text-center p-3 mt-5">
    Gilchrist Module 2 Assignment Prototype
</footer>

</body>
</html>
